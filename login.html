<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Log in — Threadlytics</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><circle cx='16' cy='16' r='16' fill='%234F46E5'/><circle cx='16' cy='16' r='6' fill='%230EA5E9'/></svg>">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Plus+Jakarta+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Plus Jakarta Sans',system-ui,sans-serif;background:#F7F7FA;display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px}
.card{background:#fff;border:1px solid rgba(0,0,0,0.08);border-radius:16px;padding:44px 40px;width:100%;max-width:420px;box-shadow:0 4px 32px rgba(0,0,0,0.06)}
.logo{display:flex;align-items:center;gap:8px;margin-bottom:32px;text-decoration:none}
.logo-dot{width:10px;height:10px;border-radius:50%;background:#0EA5E9;box-shadow:0 0 10px #0EA5E9}
.logo-text{font-family:'Syne',sans-serif;font-size:20px;font-weight:800;color:#0D0D14}
.logo-text span{color:#0EA5E9}
h1{font-family:'Syne',sans-serif;font-size:24px;font-weight:800;color:#0D0D14;margin-bottom:6px}
.sub{font-size:14px;color:#6B6B80;margin-bottom:28px;font-weight:300}
.field{margin-bottom:16px}
label{display:block;font-size:12px;font-weight:600;color:#0D0D14;margin-bottom:6px;letter-spacing:0.02em}
input{width:100%;padding:11px 14px;border:1px solid rgba(0,0,0,0.12);border-radius:8px;font-family:inherit;font-size:14px;color:#0D0D14;outline:none;transition:border-color 0.2s;background:#FAFAFA}
input:focus{border-color:#4F46E5;background:#fff;box-shadow:0 0 0 3px rgba(79,70,229,0.08)}
input::placeholder{color:#9B9BB0}
.btn{width:100%;padding:13px;background:#4F46E5;color:white;border:none;border-radius:8px;font-family:inherit;font-size:14px;font-weight:700;cursor:pointer;transition:all 0.2s;margin-top:4px}
.btn:hover{background:#4338CA;transform:translateY(-1px);box-shadow:0 4px 16px rgba(79,70,229,0.3)}
.btn:disabled{opacity:0.5;cursor:not-allowed;transform:none}
.error{background:#FFF1F2;border:1px solid rgba(239,68,68,0.2);border-radius:8px;padding:10px 14px;font-size:13px;color:#DC2626;margin-bottom:16px;display:none}
.divider{text-align:center;font-size:12px;color:#9B9BB0;margin:20px 0}
.footer-link{text-align:center;font-size:13px;color:#6B6B80;margin-top:20px}
.footer-link a{color:#4F46E5;text-decoration:none;font-weight:600}
.footer-link a:hover{text-decoration:underline}
</style>
</head>
<body>
<div class="card">
  <a href="/" class="logo">
    <div class="logo-dot"></div>
    <div class="logo-text">Thread<span>lytics</span></div>
  </a>
  <h1>Welcome back</h1>
  <p class="sub">Log in to your merchandising dashboard</p>

  <div class="error" id="error-box"></div>

  <div class="field">
    <label for="email">Email address</label>
    <input type="email" id="email" placeholder="you@brand.com" autocomplete="email" autofocus>
  </div>
  <div class="field">
    <label for="password">Password</label>
    <input type="password" id="password" placeholder="••••••••" autocomplete="current-password" onkeydown="if(event.key==='Enter')submit()">
  </div>

  <button class="btn" id="btn" onclick="submit()">Log in</button>

  <div class="footer-link" style="margin-top:16px">
    Don't have an account? <a href="/signup">Start free trial</a>
  </div>
</div>

<script>
async function submit() {
  const email    = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value.trim();
  const btn      = document.getElementById('btn');
  const errBox   = document.getElementById('error-box');
  errBox.style.display = 'none';

  if (!email || !password) {
    errBox.textContent = 'Please enter your email and password.';
    errBox.style.display = 'block';
    return;
  }

  btn.disabled = true;
  btn.textContent = 'Logging in…';

  try {
    const res  = await fetch('/auth/login', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      credentials: 'include',
      body: JSON.stringify({ email, password }),
    });
    const data = await res.json();
    if (data.ok) {
      window.location.href = data.redirect || '/dashboard';
    } else {
      errBox.textContent = data.error || 'Login failed. Please try again.';
      errBox.style.display = 'block';
      btn.disabled = false;
      btn.textContent = 'Log in';
    }
  } catch {
    errBox.textContent = 'Connection error. Please try again.';
    errBox.style.display = 'block';
    btn.disabled = false;
    btn.textContent = 'Log in';
  }
}
</script>
</body>
</html>
