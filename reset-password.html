<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reset Password — Skuvvy</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><circle cx='16' cy='16' r='16' fill='%23A8C5A0'/><circle cx='16' cy='16' r='6' fill='%23F4C0A8'/></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<!-- Non-render-blocking: the page paints immediately with the system-font
     fallback and upgrades to Montserrat/Inter once (and IF) the CDN responds.
     A blocked/slow font CDN can no longer leave the page blank. -->
<link rel="preload" as="style"
      href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800;900&family=Inter:wght@300;400;500;600&display=swap"
      onload="this.onload=null;this.rel='stylesheet'">
<noscript>
<link rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800;900&family=Inter:wght@300;400;500;600&display=swap">
</noscript>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --mint:#A8C5A0;--mint-d:#7DAA75;
  --text:#1E1E2A;--text2:#4A4A5A;--text3:#8A8A9A;
  --heading:'Montserrat',sans-serif;--body:'Inter',system-ui,sans-serif;
}
body{font-family:var(--body);min-height:100vh;display:flex;align-items:center;justify-content:center;
  background:linear-gradient(150deg,#EBF1FF 0%,#FFE8F4 38%,#E5F2EA 68%,#EDE8FF 100%);
  background-attachment:fixed;-webkit-font-smoothing:antialiased;padding:24px;}
.card{
  background:rgba(255,255,255,0.88);backdrop-filter:blur(24px);
  border-radius:24px;padding:48px 44px;width:100%;max-width:420px;
  box-shadow:0 8px 40px rgba(0,0,0,0.08),inset 0 1px 0 rgba(255,255,255,0.95);
}
.brand{font-family:var(--heading);font-size:19px;font-weight:900;color:var(--text);
  text-decoration:none;letter-spacing:-0.04em;display:block;margin-bottom:32px;}
.brand span{color:var(--mint-d)}
h1{font-family:var(--heading);font-size:28px;font-weight:900;color:var(--text);
  letter-spacing:-0.04em;line-height:1.1;margin-bottom:8px;}
.sub{font-size:15px;color:var(--text3);margin-bottom:28px;line-height:1.55}
.field{margin-bottom:16px}
.field label{display:block;font-size:11px;font-weight:700;color:var(--text2);
  margin-bottom:7px;letter-spacing:0.06em;text-transform:uppercase;font-family:var(--heading)}
.field input{width:100%;padding:14px 18px;border:1.5px solid rgba(168,197,160,0.35);
  border-radius:14px;font-family:var(--body);font-size:15px;color:var(--text);
  outline:none;transition:all 0.2s;background:rgba(168,197,160,0.10);}
.field input:focus{border-color:rgba(125,170,117,0.65);box-shadow:0 0 0 4px rgba(168,197,160,0.15);background:#fff}
.btn{width:100%;padding:15px;margin-top:4px;
  background:linear-gradient(135deg,var(--mint-d),var(--mint));
  color:white;border:none;border-radius:14px;
  font-family:var(--heading);font-size:15px;font-weight:800;
  cursor:pointer;transition:all 0.22s;box-shadow:0 6px 20px rgba(125,170,117,0.38);}
.btn:hover{transform:translateY(-2px);box-shadow:0 10px 30px rgba(125,170,117,0.48)}
.btn:disabled{opacity:0.55;cursor:not-allowed;transform:none;box-shadow:none}
.error{background:rgba(255,235,235,0.90);border:1.5px solid rgba(200,60,60,0.18);
  border-radius:12px;padding:11px 15px;font-size:13px;color:#B02020;
  margin-bottom:16px;display:none;line-height:1.5}
.success{background:rgba(168,197,160,0.20);border:1.5px solid rgba(168,197,160,0.4);
  border-radius:12px;padding:11px 15px;font-size:13px;color:#3A6A30;
  margin-bottom:16px;display:none;line-height:1.5}
/* Password strength */
.strength-bar{display:flex;gap:4px;margin-top:8px;margin-bottom:4px}
.strength-bar span{flex:1;height:3px;border-radius:2px;background:#E8EEE8;transition:background 0.3s}
.strength-bar span.active-1{background:#E3A08E}
.strength-bar span.active-2{background:#F0C4A0}
.strength-bar span.active-3{background:#B8C4E8}
.strength-bar span.active-4{background:#7DAA75}
.strength-hint{font-size:11px;color:var(--text3);margin-bottom:12px}
.footer-link{text-align:center;font-size:14px;color:var(--text2);margin-top:18px}
.footer-link a{color:var(--mint-d);text-decoration:none;font-weight:700}
</style>
</head>
<body>
<div class="card">
  <a href="/" class="brand">Skuvv<span>y</span></a>

  <div id="form-section">
    <h1>Set new password</h1>
    <p class="sub">Choose a strong password for your account</p>

    <div class="error" id="err"></div>
    <div class="success" id="ok"></div>

    <div class="field">
      <label for="new-password">New Password</label>
      <input type="password" id="new-password" placeholder="Min. 8 characters" oninput="checkStrength(this.value)" onkeydown="if(event.key==='Enter')doReset()">
      <div class="strength-bar">
        <span id="sb1"></span><span id="sb2"></span><span id="sb3"></span><span id="sb4"></span>
      </div>
      <div class="strength-hint" id="strength-hint">Use 8+ chars, uppercase, number & special character</div>
    </div>
    <div class="field">
      <label for="confirm-password">Confirm Password</label>
      <input type="password" id="confirm-password" placeholder="Repeat password" onkeydown="if(event.key==='Enter')doReset()">
    </div>

    <button class="btn" id="btn-reset" onclick="doReset()">Update Password →</button>
    <div class="footer-link"><a href="/login">← Back to log in</a></div>
  </div>
</div>

<script>
// Parse tokens from URL hash (#access_token=...&refresh_token=...&type=recovery)
const hash = Object.fromEntries(
  location.hash.replace('#','').split('&').map(p => p.split('=').map(decodeURIComponent))
);
const accessToken  = hash.access_token  || '';
const refreshToken = hash.refresh_token || '';
const type         = hash.type          || '';

if (!accessToken || type !== 'recovery') {
  document.getElementById('err').textContent = 'Invalid or expired reset link. Please request a new one.';
  document.getElementById('err').style.display = 'block';
  document.getElementById('btn-reset').disabled = true;
}

function checkStrength(v) {
  const bars  = [1,2,3,4].map(i => document.getElementById('sb'+i));
  const hint  = document.getElementById('strength-hint');
  let score   = 0;
  if (v.length >= 8)            score++;
  if (/[A-Z]/.test(v))         score++;
  if (/[0-9]/.test(v))         score++;
  if (/[^A-Za-z0-9]/.test(v))  score++;
  bars.forEach((b,i) => {
    b.className = i < score ? `active-${score}` : '';
  });
  const labels = ['','Weak','Fair','Good','Strong'];
  hint.textContent = score === 4 ? '✓ Strong password' :
    score === 0 ? 'Use 8+ chars, uppercase, number & special character' :
    labels[score] + ' — add ' + [
      v.length < 8 ? '8+ chars' : '',
      !/[A-Z]/.test(v) ? 'uppercase' : '',
      !/[0-9]/.test(v) ? 'a number' : '',
      !/[^A-Za-z0-9]/.test(v) ? 'a symbol' : '',
    ].filter(Boolean).join(', ');
  hint.style.color = score === 4 ? '#7DAA75' : score >= 2 ? '#8A9DD8' : '#9AAAB8';
}

async function doReset() {
  const pw   = document.getElementById('new-password').value;
  const cpw  = document.getElementById('confirm-password').value;
  const btn  = document.getElementById('btn-reset');
  const err  = document.getElementById('err');
  const ok   = document.getElementById('ok');
  err.style.display = 'none';
  ok.style.display  = 'none';

  if (pw.length < 8 || !/[A-Z]/.test(pw) || !/[0-9]/.test(pw) || !/[^A-Za-z0-9]/.test(pw)) {
    err.textContent = 'Password must be 8+ characters with an uppercase letter, number, and special character.';
    err.style.display = 'block'; return;
  }
  if (pw !== cpw) {
    err.textContent = 'Passwords do not match.';
    err.style.display = 'block'; return;
  }

  btn.disabled = true; btn.textContent = 'Updating…';
  try {
    const res  = await fetch('/auth/reset-password', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ access_token: accessToken, refresh_token: refreshToken, password: pw }),
    });
    const data = await res.json();
    if (data.ok) {
      ok.textContent = data.message + ' Redirecting to login…';
      ok.style.display = 'block';
      btn.textContent = 'Done ✓';
      setTimeout(() => window.location.href = '/login', 2500);
    } else {
      err.textContent = data.error || 'Something went wrong. Please try again.';
      err.style.display = 'block';
      btn.disabled = false; btn.textContent = 'Update Password →';
    }
  } catch {
    err.textContent = 'Connection error. Please try again.';
    err.style.display = 'block';
    btn.disabled = false; btn.textContent = 'Update Password →';
  }
}
</script>
</body>
</html>
